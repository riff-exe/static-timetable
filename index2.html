<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Class Timetable</title>
		<script type="text/javascript" src="schedule.json.js"></script>
		<script type="text/javascript" src="tabler.js"></script>
		<link rel="stylesheet" href="style_glassmorphism.css">
	</head>
	<body>
		<div id="main-wrapper">

			<div id="error-container" style="white-space: pre-wrap;"></div> <!-- DISPLAYS ERROR MESSAGES HERE -->

			<div class="table-container">
				<h3 class="time-table-title">Horizontal Table</h3>
				<table id="time-table-h" class="time-table">
					<!-- AUTOMATICALLY GENERATES THE TABLE HERE -->
				</table>
			</div>
		</div>


		<script>
			document.addEventListener('DOMContentLoaded', function() {
				const timeTable = document.getElementById('time-table-h');
				const dayHeaders = document.querySelectorAll('.day-header');

				Array.from(dayHeaders).forEach(header => {
					header.addEventListener('click', function() {
						// Remove glow from any previously highlighted cells
						timeTable.querySelectorAll('td.day-glow').forEach(td => {
							td.classList.remove('day-glow');
						});

						// Update active day header state
						dayHeaders.forEach(h => h.classList.remove('day-header-active'));
						this.classList.add('day-header-active');

						// Use the clicked row directly; it already contains the cells for that day
						const row = this.parentElement;
						const rowcells = row.querySelectorAll('.card-type-active')

						Array.from(rowcells).forEach(cell => {
							cell.classList.add('day-glow');
						});
					});
				});
			});
		</script>
	</body>
</html>
